<!DOCTYPE html> 
<html lang="pt-BR">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>Assistente IA</title>
      <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
      <style> *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } :root { --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c27; --border: #2a2a3a; --accent: #7c6aff; --accent2: #ff6ab0; --text: #e8e8f0; --text-muted: #7a7a9a; --user-bubble: #1e1b3a; --bot-bubble: #131320; --radius: 18px; } html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; } body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background-image: radial-gradient(ellipse 60% 50% at 20% 10%, rgba(124,106,255,0.12) 0%, transparent 60%), radial-gradient(ellipse 40% 40% at 80% 90%, rgba(255,106,176,0.08) 0%, transparent 60%); } .chat-wrapper { width: 100%; max-width: 720px; height: 100vh; max-height: 860px; display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 24px; overflow: hidden; background: var(--surface); box-shadow: 0 40px 120px rgba(0,0,0,0.6), 0 0 0 1px rgba(124,106,255,0.1); margin: 16px; } /* Header */ .chat-header { padding: 20px 28px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 14px; flex-shrink: 0; } .header-avatar { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; } .header-info h1 { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; letter-spacing: -0.3px; color: var(--text); } .header-info p { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; } .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; } @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } } /* Messages */ .chat-messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; } .chat-messages::-webkit-scrollbar { width: 4px; } .chat-messages::-webkit-scrollbar-track { background: transparent; } .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; } .message { display: flex; gap: 10px; animation: fadeUp 0.3s ease; max-width: 85%; } @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } .message.user { align-self: flex-end; flex-direction: row-reverse; } .message.bot { align-self: flex-start; } .msg-avatar { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 2px; } .message.bot .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); } .message.user .msg-avatar { background: var(--surface2); border: 1px solid var(--border); } .msg-bubble { padding: 12px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.65; word-break: break-word; } .message.user .msg-bubble { background: var(--user-bubble); border: 1px solid rgba(124,106,255,0.25); border-bottom-right-radius: 6px; color: var(--text); } .message.bot .msg-bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 6px; color: var(--text); } /* Welcome */ .welcome { text-align: center; padding: 40px 20px; animation: fadeUp 0.5s ease; } .welcome-icon { width: 64px; height: 64px; border-radius: 20px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 20px; box-shadow: 0 8px 32px rgba(124,106,255,0.3); } .welcome h2 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 8px; background: linear-gradient(135deg, var(--text), var(--text-muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; } .welcome p { color: var(--text-muted); font-size: 14px; max-width: 320px; margin: 0 auto; } /* Typing indicator */ .typing { display: flex; gap: 10px; align-self: flex-start; animation: fadeUp 0.3s ease; } .typing .msg-avatar { width: 32px; height: 32px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; } .typing-dots { background: var(--bot-bubble); border: 1px solid var(--border); border-radius: var(--radius); border-bottom-left-radius: 6px; padding: 14px 18px; display: flex; gap: 5px; align-items: center; } .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.2s infinite; } .typing-dots span:nth-child(2) { animation-delay: 0.2s; } .typing-dots span:nth-child(3) { animation-delay: 0.4s; } @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-6px); opacity: 1; } } /* Input area */ .chat-input-area { padding: 16px 20px 20px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; } .input-row { display: flex; gap: 10px; align-items: flex-end; background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 10px 10px 10px 16px; transition: border-color 0.2s; } .input-row:focus-within { border-color: rgba(124,106,255,0.5); box-shadow: 0 0 0 3px rgba(124,106,255,0.08); } #user-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; resize: none; max-height: 120px; min-height: 24px; } #user-input::placeholder { color: var(--text-muted); } #send-btn { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s, transform 0.1s; } #send-btn:hover { opacity: 0.85; } #send-btn:active { transform: scale(0.95); } #send-btn:disabled { opacity: 0.4; cursor: not-allowed; } #send-btn svg { width: 16px; height: 16px; fill: white; } .input-hint { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 10px; } /* Error */ .error-msg { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); color: #ff8080; border-radius: 12px; padding: 10px 14px; font-size: 13px; align-self: center; max-width: 85%; animation: fadeUp 0.3s ease; } @media (max-width: 600px) { .chat-wrapper { border-radius: 0; margin: 0; height: 100vh; max-height: 100vh; } } </style>
   </head>
   <body>
      <div class="chat-wrapper">
         <div class="chat-header">
            <div class="header-avatar">🤖</div>
            <div class="header-info">
               <h1>Assistente IA</h1>
               <p><span class="status-dot"></span> Online</p>
            </div>
         </div>
         <div class="chat-messages" id="messages">
            <div class="welcome">
               <div class="welcome-icon">✦</div>
               <h2>Olá! Como posso ajudar?</h2>
               <p>Faça sua pergunta e responderei em instantes.</p>
            </div>
         </div>
         <div class="chat-input-area">
            <div class="input-row">
               <textarea id="user-input" placeholder="Digite sua mensagem..." rows="1" autocomplete="off" ></textarea>
               <button id="send-btn" title="Enviar">
                  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                     <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                  </svg>
               </button>
            </div>
            <p class="input-hint">Enter para enviar · Shift+Enter para nova linha</p>
         </div>
      </div>
      <script>
         const PROXY_URL = "https://langflow-proxy-c8bbcfcxhtftgjcd.eastus-01.azurewebsites.net/api/proxy";
         const SESSION_ID = "session-" + Math.random().toString(36).slice(2);
         const messagesEl = document.getElementById("messages");
         const inputEl = document.getElementById("user-input");
         const sendBtn = document.getElementById("send-btn");
         let isLoading = false;
         // Auto-resize textarea 
         inputEl.addEventListener("input", () => {
             inputEl.style.height = "auto";
             inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
         });
         // Enter to send 
         inputEl.addEventListener("keydown", (e) => {
             if (e.key === "Enter" && !e.shiftKey) {
                 e.preventDefault();
                 sendMessage();
             }
         });
         sendBtn.addEventListener("click", sendMessage);

         function scrollToBottom() {
             messagesEl.scrollTop = messagesEl.scrollHeight;
         }

         function removeWelcome() {
             const welcome = messagesEl.querySelector(".welcome");
             if (welcome) welcome.remove();
         }

         function addMessage(text, role) {
             removeWelcome();
             const div = document.createElement("div");
             div.className = `message ${role}`;
             const avatar = role === "user" ? "👤" : "🤖";
             div.innerHTML = ` <div class="msg-avatar">${avatar}</div> <div class="msg-bubble">${escapeHtml(text)}</div> `;
             messagesEl.appendChild(div);
             scrollToBottom();
             return div;
         }

         function addTyping() {
             removeWelcome();
             const div = document.createElement("div");
             div.className = "typing";
             div.innerHTML = ` <div class="msg-avatar">🤖</div> <div class="typing-dots"> <span></span><span></span><span></span> </div> `;
             messagesEl.appendChild(div);
             scrollToBottom();
             return div;
         }

         function addError(msg) {
             const div = document.createElement("div");
             div.className = "error-msg";
             div.textContent = "⚠ " + msg;
             messagesEl.appendChild(div);
             scrollToBottom();
         }

         function escapeHtml(text) {
             return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");
         }
         async function sendMessage() {
             const text = inputEl.value.trim();
             if (!text || isLoading) return;
             isLoading = true;
             sendBtn.disabled = true;
             inputEl.value = "";
             inputEl.style.height = "auto";
             addMessage(text, "user");
             const typingEl = addTyping();
             try {
                 const response = await fetch(PROXY_URL, {
                     method: "POST",
                     headers: {
                         "Content-Type": "application/json"
                     },
                     body: JSON.stringify({
                         input_value: text,
                         input_type: "chat",
                         output_type: "chat",
                         session_id: SESSION_ID
                     })
                 });
                 typingEl.remove();
                 if (!response.ok) {
                     throw new Error(`Erro ${response.status}`);
                 }
                 const data = await response.json(); // Extrai a resposta do formato Langflow 
                 const reply = data?.outputs?.[0]?.outputs?.[0]?.results?.message?.text || data?.outputs?.[0]?.outputs?.[0]?.artifacts?.message || data?.result || "Não consegui processar a resposta.";
                 addMessage(reply, "bot");
             } catch (err) {
                 typingEl.remove();
                 addError("Erro ao conectar com o assistente. Tente novamente.");
                 console.error(err);
             } finally {
                 isLoading = false;
                 sendBtn.disabled = false;
                 inputEl.focus();
             }
         }
      </script> 
   </body>
</html>
